name: Build Flutter APK (FINAL FIX)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter 3.22.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: stable

      # 👇 修正版 sed 命令，精准匹配并修改 SDK 约束
      - name: Fix pubspec.yaml SDK constraint
        run: |
          sed -i 's/sdk: ^3.10.7/sdk: ">=3.0.0 <4.0.0"/' pubspec.yaml
          cat pubspec.yaml | grep sdk

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
